<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Build Hub">
<meta name="theme-color" content="#080810">
<title>Build Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080810;
  --s1:#0e0e1a;
  --s2:#141425;
  --s3:#1a1a30;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#dde0f0;
  --muted:#6a6a88;
  --muted2:#4a4a60;
  --poe:#d4883a;
  --poe-dim:rgba(212,136,58,0.15);
  --div:#3a8fff;
  --div-dim:rgba(58,143,255,0.12);
  --s-tier:#ffd700;
  --a-tier:#4a9eff;
  --b-tier:#64c864;
  --exotic:#e8a020;
  --named:#c060ff;
  --set:#3a8fff;
  --gem:#b040f0;
  --talent:#ff4060;
  --spec:#20c0b0;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:9999}
#app{display:flex;flex-direction:column;height:100vh;max-width:960px;margin:0 auto}

header{flex-shrink:0;background:linear-gradient(180deg,rgba(8,8,16,0.98) 0%,rgba(8,8,16,0.9) 100%);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border:1.5px solid var(--div);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--div-dim);transition:.3s}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;color:#fff}
.logo-text span{color:var(--div);transition:.3s}
.icon-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:.15s}
.icon-btn:hover{color:var(--text);background:var(--s3)}

.game-tabs{display:flex;padding:0 18px 12px;gap:8px;overflow-x:auto;scrollbar-width:none}
.game-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:.2s}
.gtab-count{background:rgba(255,255,255,0.1);border-radius:4px;padding:1px 6px;font-size:11px}
.gtab.poe.on{background:var(--poe-dim);border-color:var(--poe);color:var(--poe)}
.gtab.div2.on{background:var(--div-dim);border-color:var(--div);color:var(--div)}
.gtab:hover:not(.on){background:var(--s2);color:var(--text)}

.filter-bar{display:flex;padding:8px 18px;gap:6px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Rajdhani',sans-serif;letter-spacing:.3px}
.chip.on{background:rgba(255,255,255,0.08);border-color:var(--border2);color:#fff}
.chip:hover:not(.on){background:var(--s2);color:var(--text)}

.list-scroll{flex:1;overflow-y:auto;padding:14px 18px 24px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.list-scroll::-webkit-scrollbar{width:3px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--s3)}

.tier-label{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:12px 0 6px;display:flex;align-items:center;gap:10px}
.tier-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tl-badge{font-size:13px;font-weight:700;padding:2px 8px;border-radius:5px}
.tl-s{color:var(--s-tier);border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08)}
.tl-a{color:var(--a-tier);border:1px solid rgba(74,158,255,.3);background:rgba(74,158,255,.08)}

/* BUILD CARD */
.bcard{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;cursor:pointer;transition:.18s;overflow:hidden;position:relative}
.bcard:hover{border-color:var(--border2);background:var(--s2);transform:translateY(-1px)}
.bcard:active{transform:scale(0.99)}
.bcard-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.bcard-inner{padding:14px 14px 14px 17px}
.bcard-top{display:flex;align-items:flex-start;gap:12px}
.bcard-emblem{width:52px;height:52px;border-radius:10px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.bcard-info{flex:1;min-width:0}
.bcard-name{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:#fff;letter-spacing:.3px;line-height:1.1;margin-bottom:2px}
.bcard-sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.bcard-tags{display:flex;flex-wrap:wrap;gap:4px}
.btag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px;font-family:'Rajdhani',sans-serif}
.btag-tier-s{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);color:var(--s-tier)}
.btag-tier-a{background:rgba(74,158,255,.12);border:1px solid rgba(74,158,255,.3);color:var(--a-tier)}
.btag-boss{background:rgba(200,80,255,.1);border:1px solid rgba(200,80,255,.25);color:#c060ff}
.btag-map{background:rgba(80,200,180,.1);border:1px solid rgba(80,200,180,.25);color:#50c8b4}
.btag-dmg{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);color:#ff8080}
.btag-def{background:rgba(80,150,255,.1);border:1px solid rgba(80,150,255,.25);color:#60a0ff}
.btag-easy{background:rgba(100,200,100,.1);border:1px solid rgba(100,200,100,.25);color:#64c864}
.btag-medium{background:rgba(255,180,50,.1);border:1px solid rgba(255,180,50,.25);color:#ffb432}
.btag-hard{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);color:#ff6464}
.bcard-arrow{color:var(--muted2);font-size:20px;margin-top:2px}
.bcard-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.mini-stat{display:flex;align-items:center;gap:6px}
.mini-lbl{font-size:10px;color:var(--muted);width:44px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.5px;flex-shrink:0}
.mini-bar{flex:1;height:3px;background:var(--s3);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px}
.mini-val{font-size:10px;font-weight:700;width:22px;text-align:right;flex-shrink:0}

/* DETAIL */
#detail{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;max-width:960px;margin:0 auto}
#detail.open{display:flex}
.dh{flex-shrink:0;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--s1) 0%,var(--bg) 100%)}
.dh-top{display:flex;align-items:center;gap:12px;padding:14px 18px 8px}
.back-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:20px;flex-shrink:0;transition:.15s}
.back-btn:hover{color:#fff}
.dh-name{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-sub{font-size:12px;color:var(--muted);padding:0 18px 8px}
.dh-hero{padding:0 18px 12px;display:flex;gap:6px;flex-wrap:wrap}

.detail-scroll{flex:1;overflow-y:auto;padding:16px 18px 32px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.detail-scroll::-webkit-scrollbar{width:3px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--s3)}

.ds{margin-bottom:22px}
.ds-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ds-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* RATING */
.rating-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.rating-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rating-label{font-size:12px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.5px}
.rating-stars{font-size:12px;letter-spacing:1px}
.rating-bar{height:5px;background:var(--s3);border-radius:5px;overflow:hidden}
.rating-fill{height:100%;border-radius:5px}

/* WEAPON CARD */
.weapon-card{background:linear-gradient(135deg,var(--s2) 0%,var(--s1) 100%);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border2);position:relative;overflow:hidden}
.weapon-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.weapon-icon-box{width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(0,0,0,.3);border:1px solid var(--border2);flex-shrink:0}
.weapon-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.weapon-type{font-size:11px;color:var(--muted);margin-top:1px}
.weapon-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(0,0,0,.25);border-radius:9px;padding:10px;border:1px solid var(--border)}
.wstat{text-align:center}
.wstat-val{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff}
.wstat-lbl{font-size:9px;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.weapon-talent-box{margin-top:10px;background:rgba(255,64,96,.06);border:1px solid rgba(255,64,96,.2);border-radius:8px;padding:9px 12px}
.wtb-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--talent);letter-spacing:.3px;margin-bottom:3px}
.wtb-desc{font-size:12px;color:#b0b0c8;line-height:1.4}

/* GEAR CARD */
.gear-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start}
.gear-card:hover{border-color:var(--border2);background:var(--s2)}
.gear-card-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.gear-slot-icon{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid;flex-shrink:0}
.ico-exotic{background:rgba(232,160,32,.12);border-color:rgba(232,160,32,.35)}
.ico-named{background:rgba(192,96,255,.12);border-color:rgba(192,96,255,.35)}
.ico-set{background:rgba(58,143,255,.12);border-color:rgba(58,143,255,.35)}
.ico-gem{background:rgba(176,64,240,.12);border-color:rgba(176,64,240,.35)}
.ico-talent{background:rgba(255,64,96,.12);border-color:rgba(255,64,96,.35)}
.ico-spec{background:rgba(32,192,176,.12);border-color:rgba(32,192,176,.35)}
.slot-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-align:center;font-family:'Rajdhani',sans-serif;text-transform:uppercase;color:var(--muted);line-height:1.2;max-width:48px}
.gear-body{flex:1;min-width:0}
.gear-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.gear-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.gbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;flex-shrink:0;white-space:nowrap}
.gb-exotic{background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.35);color:var(--exotic)}
.gb-named{background:rgba(192,96,255,.15);border:1px solid rgba(192,96,255,.35);color:var(--named)}
.gb-set{background:rgba(58,143,255,.15);border:1px solid rgba(58,143,255,.35);color:var(--set)}
.gb-gem{background:rgba(176,64,240,.15);border:1px solid rgba(176,64,240,.35);color:var(--gem)}
.gb-talent{background:rgba(255,64,96,.15);border:1px solid rgba(255,64,96,.35);color:var(--talent)}
.gb-spec{background:rgba(32,192,176,.15);border:1px solid rgba(32,192,176,.35);color:var(--spec)}
.gear-talent-lbl{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:.3px;padding:2px 7px;border-radius:5px;background:rgba(255,64,96,.1);border:1px solid rgba(255,64,96,.2);color:var(--talent)}
.gear-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-top:5px}
.gear-mods{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.gear-mod{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif}
.gear-mod.hot{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.2);color:#c8a020}

/* ASCENDANCY */
.asc-list{display:flex;flex-direction:column;gap:6px}
.asc-item{display:flex;align-items:flex-start;gap:11px;background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:11px 13px}
.asc-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
.asc-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px;margin-bottom:3px}
.asc-desc{font-size:12px;color:var(--muted);line-height:1.4}

/* MECHANIC */
.mech-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:7px}
.mech-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.mech-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mech-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.mech-stack{display:flex;align-items:center;gap:5px;margin-top:4px}
.mech-pip{width:10px;height:4px;border-radius:2px;background:var(--s3)}
.mech-pip.on{background:var(--talent)}
.mech-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* OPTION CARDS */
.opt-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;margin-bottom:7px}
.opt-card:hover{border-color:var(--border2);background:var(--s2)}
.opt-card-badge{position:absolute;top:0;right:0;font-size:10px;font-weight:700;padding:4px 10px;border-radius:0 0 0 8px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.oc-rec{background:rgba(255,215,0,.15);color:var(--s-tier);border-left:1px solid rgba(255,215,0,.3);border-bottom:1px solid rgba(255,215,0,.3)}
.oc-alt{background:rgba(74,158,255,.1);color:var(--a-tier);border-left:1px solid rgba(74,158,255,.25);border-bottom:1px solid rgba(74,158,255,.25)}
.oc-free{background:rgba(100,200,100,.1);color:var(--b-tier);border-left:1px solid rgba(100,200,100,.25);border-bottom:1px solid rgba(100,200,100,.25)}
.opt-card-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;padding-right:60px}
.opt-card-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* NOTES */
.note-box{border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.6;margin-bottom:7px}
.note-warn{background:rgba(255,180,0,.06);border:1px solid rgba(255,180,0,.2);color:#c09020}
.note-warn strong{color:#ffd040}
.note-info{background:rgba(58,143,255,.06);border:1px solid rgba(58,143,255,.2);color:#6090c0}
.note-info strong{color:#60a0ff}
.note-tip{background:rgba(80,200,160,.06);border:1px solid rgba(80,200,160,.2);color:#50a080}
.note-tip strong{color:#50c8a0}

/* SEARCH */
#search-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);z-index:200;display:none;flex-direction:column;padding:20px;max-width:960px;margin:0 auto}
#search-ov.open{display:flex}
.search-bar{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;margin-bottom:14px}
.search-bar svg{color:var(--muted);flex-shrink:0}
#srch-in{background:transparent;border:none;outline:none;color:#fff;font-size:16px;font-family:'Exo 2',sans-serif;flex:1}
#srch-in::placeholder{color:var(--muted)}
.srch-cancel{color:var(--muted);font-size:13px;cursor:pointer;font-weight:600;font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
#srch-results{flex:1;overflow-y:auto}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px}
.guide-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;border:1px solid var(--border2);background:var(--s2);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.15s;text-decoration:none;flex-shrink:0}
.guide-btn:hover{border-color:var(--div);color:var(--div);background:var(--div-dim)}
.guide-btn span{font-size:14px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon" id="logoIcon">🎮</div>
        <div class="logo-text">Build<span id="logoAccentEl">Hub</span></div>
      </div>
      <button class="icon-btn" onclick="openSearch()" title="Search">🔍</button>
    </div>
    <div class="game-tabs" id="gameTabs"></div>
  </header>
  <div class="filter-bar" id="filterBar"></div>
  <div class="list-scroll" id="listScroll"></div>
</div>

<div id="detail">
  <div class="dh">
    <div class="dh-top">
      <button class="back-btn" onclick="closeDetail()">‹</button>
      <div class="dh-name" id="dhName"></div>
      <a id="guideBtn" class="guide-btn" target="_blank" style="display:none"><span>📄</span>Full Guide</a>
    </div>
    <div class="dh-sub" id="dhSub"></div>
    <div class="dh-hero" id="dhHero"></div>
  </div>
  <div class="detail-scroll" id="detailScroll"></div>
</div>

<div id="search-ov">
  <div class="search-bar">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="srch-in" placeholder="Search builds…" oninput="doSearch(this.value)">
    <span class="srch-cancel" onclick="closeSearch()">Cancel</span>
  </div>
  <div id="srch-results"></div>
</div>

<script>
// ── HELPERS ──
function gC(icon,slotType,slotLbl,badgeCls,name,badgeTxt,subLbl,desc,m1,m2){
  const ic={exotic:'ico-exotic',named:'ico-named',set:'ico-set',gem:'ico-gem',talent:'ico-talent',spec:'ico-spec'}[slotType]||'ico-set';
  return `<div class="gear-card">
    <div class="gear-card-left"><div class="gear-slot-icon ${ic}">${icon}</div><div class="slot-lbl">${slotLbl}</div></div>
    <div class="gear-body">
      <div class="gear-top"><div class="gear-name">${name}</div><span class="gbadge ${badgeCls}">${badgeTxt}</span></div>
      <div class="gear-talent-lbl">${subLbl}</div>
      <div class="gear-desc">${desc}</div>

const GAMES=[
  {id:'poe2',label:'Path of Exile 2',icon:'🔮',ac:'poe'},
  {id:'div2',label:'The Division 2',icon:'🎯',ac:'div'},
  {id:'d4',label:'Diablo 4',icon:'💀',ac:'d4'},
  {id:'swtor',label:'Star Wars: TOR',icon:'🚀',ac:'sw'},
  {id:'d2r',label:'Diablo 2: Resurrected',icon:'☠️',ac:'d2r'}
];

// ── STATE ──
let activeGame='div2', activeFilters=[];

function tagBadge(t){
  const m={boss:'btag-boss',map:'btag-map',dmg:'btag-dmg',def:'btag-def'};
  const l={boss:'Bossing',map:'Mapping',dmg:'High DMG',def:'Tanky'};
  return `<span class="btag ${m[t]}">${l[t]||t}</span>`;
}
function tierBadge(t){
  const m={S:'btag-tier-s',A:'btag-tier-a'};
  return `<span class="btag ${m[t]}">${t}-Tier</span>`;
}
function diffBadge(d){
  const m={easy:'btag-easy',medium:'btag-medium',hard:'btag-hard'};
  const l={easy:'Easy',medium:'Medium',hard:'Complex'};
  return `<span class="btag ${m[d]}">${l[d]}</span>`;
}

function setAccent(game){
  const color=game==='poe2'?'#d4883a':'#3a8fff';
  const dim=game==='poe2'?'rgba(212,136,58,0.15)':'rgba(58,143,255,0.12)';
  document.documentElement.style.setProperty('--active-color',color);
  document.querySelector('.logo-icon').style.borderColor=color;
  document.querySelector('.logo-icon').style.background=dim;
  document.getElementById('logoAccentEl').style.color=color;
  const g=GAMES.find(x=>x.id===game);
  document.getElementById('logoIcon').textContent=g.icon;
}

function renderGameTabs(){
  const counts={poe2:BUILDS.filter(b=>b.game==='poe2').length,div2:BUILDS.filter(b=>b.game==='div2').length};
  document.getElementById('gameTabs').innerHTML=GAMES.map(g=>`
    <button class="gtab ${g.ac}${activeGame===g.id?' on':''}" onclick="setGame('${g.id}')">
      ${g.icon} ${g.label}<span class="gtab-count">${counts[g.id]}</span>
    </button>`).join('');
}

function getFilters(){
  const base=[{id:'all',l:'All'},{id:'S',l:'S-Tier'},{id:'A',l:'A-Tier'}];
  const poe=[{id:'boss',l:'Bossing'},{id:'map',l:'Mapping'},{id:'easy',l:'Easy'},{id:'hard',l:'Complex'}];
  const div=[{id:'boss',l:'Bossing'},{id:'map',l:'Mapping'},{id:'dmg',l:'High DMG'},{id:'def',l:'Tanky'},{id:'easy',l:'Easy'},{id:'medium',l:'Medium'}];
  return [...base,...(activeGame==='poe2'?poe:div)];
}

function renderFilters(){
  document.getElementById('filterBar').innerHTML=getFilters().map(f=>`
    <button class="chip${activeFilters.includes(f.id)||(f.id==='all'&&!activeFilters.length)?' on':''}" onclick="toggleFilter('${f.id}')">${f.l}</button>`).join('');
}

function matches(b){
  if(!activeFilters.length) return true;
  return activeFilters.every(f=>{
    if(f==='S'||f==='A') return b.tier===f;
    if(f==='easy'||f==='medium'||f==='hard') return b.diff===f;
    return b.tags.includes(f);
  });
}

function buildCard(b){
  const allTags=[tierBadge(b.tier),diffBadge(b.diff),...b.tags.map(tagBadge)].join('');
  const bars=b.stats.map(s=>`
    <div class="mini-stat">
      <div class="mini-lbl">${s.l}</div>
      <div class="mini-bar"><div class="mini-fill" style="width:${s.v}%;background:${s.c}"></div></div>
      <div class="mini-val" style="color:${s.c}">${Math.round(s.v/20)}★</div>
    </div>`).join('');
  return `<div class="bcard" onclick="openDetail('${b.id}')">
    <div class="bcard-accent" style="background:${b.accent}"></div>
    <div class="bcard-inner">
      <div class="bcard-top">
        <div class="bcard-emblem" style="background:${b.accent}22;border-color:${b.accent}44">${b.icon}</div>
        <div class="bcard-info">
          <div class="bcard-name">${b.name}</div>
          <div class="bcard-sub">${b.sub}</div>
          <div class="bcard-tags">${allTags}</div>
        </div>
        <div class="bcard-arrow">›</div>
      </div>
      <div class="bcard-stats">${bars}</div>
    </div></div>`;
}

function renderList(builds){
  const el=document.getElementById('listScroll');
  if(!builds.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>No builds found</div>`;return;}
  const s=builds.filter(b=>b.tier==='S'),a=builds.filter(b=>b.tier==='A');
  let h='';
  if(s.length) h+=`<div class="tier-label"><span class="tl-badge tl-s">S</span></div>`+s.map(buildCard).join('');
  if(a.length) h+=`<div class="tier-label"><span class="tl-badge tl-a">A</span></div>`+a.map(buildCard).join('');
  el.innerHTML=h;
}

function renderAll(){
  setAccent(activeGame);
  renderGameTabs();
  renderFilters();
  renderList(BUILDS.filter(b=>b.game===activeGame&&matches(b)));
}

function setGame(g){activeGame=g;activeFilters=[];document.getElementById('listScroll').scrollTop=0;renderAll();}
function toggleFilter(f){
  if(f==='all'){activeFilters=[];}
  else{const i=activeFilters.indexOf(f);if(i>-1)activeFilters.splice(i,1);else activeFilters.push(f);}
  renderAll();
}

function openDetail(id){
  const b=BUILDS.find(x=>x.id===id);if(!b) return;
  document.getElementById('dhName').textContent=b.name;
  document.getElementById('dhSub').textContent=b.sub;
  document.getElementById('dhHero').innerHTML=[tierBadge(b.tier),diffBadge(b.diff),...b.tags.map(tagBadge)].join('');
  const btn=document.getElementById('guideBtn');
  if(b.guide){btn.href=b.guide;btn.style.display='flex';}else{btn.style.display='none';}
  const accentColor = b.accent;
  btn.style.setProperty('--div', accentColor);
  btn.style.setProperty('--div-dim', accentColor+'22');
  const ratingHtml=`<div class="ds"><div class="ds-title">📊 Rating</div>
    <div class="rating-grid">${b.stats.map(s=>`
      <div><div class="rating-row"><span class="rating-label">${s.l}</span><span class="rating-stars" style="color:${s.c}">${'★'.repeat(Math.round(s.v/20))}${'☆'.repeat(5-Math.round(s.v/20))}</span></div>
      <div class="rating-bar"><div class="rating-fill" style="width:${s.v}%;background:${s.c}"></div></div></div>`).join('')}
    </div></div>`;
  document.getElementById('detailScroll').innerHTML=ratingHtml+b.detail;
  document.getElementById('detailScroll').scrollTop=0;
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open');}

function openSearch(){
  document.getElementById('search-ov').classList.add('open');
  document.getElementById('srch-in').value='';
  document.getElementById('srch-results').innerHTML='';
  setTimeout(()=>document.getElementById('srch-in').focus(),80);
}
function closeSearch(){document.getElementById('search-ov').classList.remove('open');}
function doSearch(q){
  const sq=q.toLowerCase().trim();
  if(!sq){document.getElementById('srch-results').innerHTML='';return;}
  const res=BUILDS.filter(b=>b.name.toLowerCase().includes(sq)||b.sub.toLowerCase().includes(sq));
  if(!res.length){document.getElementById('srch-results').innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>No builds found</div>`;return;}
  document.getElementById('srch-results').innerHTML=res.map(buildCard).join('');
  document.querySelectorAll('#srch-results .bcard').forEach((el,i)=>{
    el.onclick=()=>{closeSearch();setTimeout(()=>openDetail(res[i].id),50);};
  });
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeSearch();}});
renderAll();
</script>

</html>
