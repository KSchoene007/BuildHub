<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Build Hub">
<meta name="theme-color" content="#080810">
<title>Build Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;900&family=Cinzel:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --s1:#0e0e1a;
  --s2:#141425;
  --s3:#1a1a30;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#dde0f0;
  --muted:#6a6a88;
  --muted2:#4a4a60;
  --bright:#ffffff;
  --red:#e03060;
  --gold:#E8A820;
  --teal:#2FB8B4;
  --poe:#d4883a;
  --div:#E8700A;
  --d4:#CC2020;
  --sw:#4A9AE0;
  --d2r:#80A040;
  --active-color:#E8700A;
  --theme-glow:rgba(255,255,255,0.03);
  --theme-scan:rgba(255,255,255,0.01);
  --s-tier:#ffd700;
  --a-tier:#4a9eff;
  --b-tier:#64c864;
  --b-tier:#64c864;
  --exotic:#e8a020;
  --named:#c060ff;
  --set:#3a8fff;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  transition:background .4s;
}

/* ─── SCANLINE OVERLAY ─── */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 3px);
  pointer-events:none;z-index:9999;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 0% 0%,var(--theme-glow) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,var(--theme-glow) 0%,transparent 50%);
  pointer-events:none;z-index:0;transition:background .4s;
}

/* ─── LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1}
.list-scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.list-scroll::-webkit-scrollbar{width:4px}
.list-scroll::-webkit-scrollbar-track{background:transparent}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── HEADER ─── */
header{
  flex-shrink:0;
  background:linear-gradient(180deg,var(--bg) 0%,rgba(8,8,16,0.95) 100%);
  border-bottom:1px solid rgba(255,255,255,0.04);
  position:relative;
  z-index:10;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--active-color),transparent);
  opacity:0.4;transition:background .4s;
}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}

/* ─── LOGO ─── */
.logo{display:flex;align-items:center;gap:10px;cursor:default}
.logo-icon{
  width:36px;height:36px;border-radius:8px;
  border:1px solid var(--active-color);
  background:rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;
  transition:.3s;overflow:hidden;
  box-shadow:0 0 12px var(--theme-glow);
}
.logo-icon svg{width:22px;height:22px;transition:.3s}
.logo-text{
  font-family:'Rajdhani',sans-serif;
  font-size:23px;font-weight:700;
  color:var(--bright);letter-spacing:1px;
}
.logo-text span{color:var(--active-color);transition:color .3s}
.icon-btn{
  width:36px;height:36px;border-radius:8px;
  border:1px solid var(--border);
  background:var(--s1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;color:var(--muted);font-size:17px;
}
.icon-btn:hover{border-color:var(--active-color);color:var(--active-color)}

/* ─── GAME TABS ─── */
.game-tabs-wrap{position:relative;padding:0 14px 12px}
.game-tabs-wrap::before,.game-tabs-wrap::after{
  content:'';position:absolute;top:0;bottom:12px;width:28px;
  pointer-events:none;z-index:2;
}
.game-tabs-wrap::before{left:14px;background:linear-gradient(90deg,var(--bg),transparent)}
.game-tabs-wrap::after{right:14px;background:linear-gradient(270deg,var(--bg),transparent)}
.game-tabs{
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;padding:2px 2px 2px;
  scroll-behavior:smooth;
}
.game-tabs::-webkit-scrollbar{display:none}
.gtab{
  flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  padding:8px 14px;border-radius:10px;
  border:1px solid var(--border);
  background:var(--s1);
  color:var(--muted);
  font-family:'Rajdhani',sans-serif;
  font-size:14px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;
  transition:.2s;min-width:80px;
  position:relative;overflow:hidden;
}
.gtab::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:transparent;transition:.2s;
}
.gtab:hover{background:var(--s2);border-color:var(--border2);color:var(--text)}
.gtab-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.gtab-icon svg{width:22px;height:22px;transition:.3s}
.gtab-label{font-size:12px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.gtab-count{font-size:11px;opacity:0.4;margin-top:1px}

/* Active tab states — per game */
.gtab.poe.on{background:linear-gradient(135deg,#1a1008,#0e0a06);border-color:#8B6914;color:#C8A040}
.gtab.poe.on .gtab-icon svg{filter:drop-shadow(0 0 4px rgba(200,160,64,0.6))}
.gtab.poe.on::after{background:linear-gradient(90deg,transparent,#C8A040,transparent)}

.gtab.div.on,.gtab.div2.on{background:linear-gradient(135deg,#101520,#080c10);border-color:#E8700A;color:#E8700A}
.gtab.div.on .gtab-icon svg,.gtab.div2.on .gtab-icon svg{filter:drop-shadow(0 0 4px rgba(232,112,10,0.6))}
.gtab.div.on::after,.gtab.div2.on::after{background:linear-gradient(90deg,transparent,#E8700A,transparent)}

.gtab.d4.on{background:linear-gradient(135deg,#180b0b,#0c0505);border-color:#CC2020;color:#FF5050}
.gtab.d4.on .gtab-icon svg{filter:drop-shadow(0 0 4px rgba(204,32,32,0.7))}
.gtab.d4.on::after{background:linear-gradient(90deg,transparent,#CC2020,transparent)}

.gtab.sw.on{background:linear-gradient(135deg,#0a1020,#02050f);border-color:#4A9AE0;color:#6AB4FF}
.gtab.sw.on .gtab-icon svg{filter:drop-shadow(0 0 4px rgba(74,154,224,0.6))}
.gtab.sw.on::after{background:linear-gradient(90deg,transparent,#4A9AE0,transparent)}

.gtab.d2r.on{background:linear-gradient(135deg,#0e1208,#060808);border-color:#80A040;color:#90C050}
.gtab.d2r.on .gtab-icon svg{filter:drop-shadow(0 0 4px rgba(128,160,64,0.5))}
.gtab.d2r.on::after{background:linear-gradient(90deg,transparent,#80A040,transparent)}

/* ─── FILTER BAR ─── */
.filter-bar-wrap{
  position:relative;flex-shrink:0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.filter-bar-wrap::before,.filter-bar-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:20px;
  pointer-events:none;z-index:2;
}
.filter-bar-wrap::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.filter-bar-wrap::after{right:0;background:linear-gradient(270deg,var(--bg),transparent)}
.filter-bar{
  display:flex;padding:8px 14px;gap:6px;
  overflow-x:auto;scrollbar-width:none;scroll-behavior:smooth;
}
.filter-bar::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:4px 12px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-size:13px;font-weight:700;
  cursor:pointer;transition:.15s;
  font-family:'Rajdhani',sans-serif;
  letter-spacing:.5px;text-transform:uppercase;
}
.chip.on{
  background:var(--active-color);
  border-color:var(--active-color);
  color:#fff;
  box-shadow:0 0 8px rgba(var(--active-r,232),var(--active-g,112),var(--active-b,10),0.3);
}
.chip:hover:not(.on){background:var(--s2);color:var(--text);border-color:var(--border2)}

/* ─── BUILD CARDS ─── */
.bcard{
  border-radius:12px;margin-bottom:8px;
  cursor:pointer;transition:.18s;
  overflow:hidden;position:relative;
  border:1px solid var(--border);
}
.bcard:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.1)}
.bcard:active{transform:scale(0.99)}

/* Game-specific card backgrounds */
.bcard-poe2{background:linear-gradient(135deg,#120d04 0%,#0e0e18 50%,#0a0a14 100%)}
.bcard-poe2:hover{box-shadow:0 4px 20px rgba(212,136,58,0.12)}
.bcard-div2{background:linear-gradient(135deg,#0a0f18 0%,#0e0e18 50%,#0a0a14 100%)}
.bcard-div2:hover{box-shadow:0 4px 20px rgba(232,112,10,0.12)}
.bcard-d4{background:linear-gradient(135deg,#110606 0%,#0e0e18 50%,#0a0a14 100%)}
.bcard-d4:hover{box-shadow:0 4px 20px rgba(204,32,32,0.14)}
.bcard-swtor{background:linear-gradient(135deg,#04081a 0%,#0e0e18 50%,#0a0a14 100%)}
.bcard-swtor:hover{box-shadow:0 4px 20px rgba(74,154,224,0.12)}
.bcard-d2r{background:linear-gradient(135deg,#070a04 0%,#0e0e18 50%,#0a0a14 100%)}

/* Variant C card layout */
.bc-top{height:96px;position:relative;display:flex;align-items:flex-end;overflow:hidden}
.bc-top-inner{display:flex;align-items:center;gap:10px;padding:10px 12px;width:100%;position:relative;z-index:2}
.bc-icon-wrap{width:52px;height:52px;border-radius:10px;border:1px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bc-icon-wrap svg{width:32px;height:32px}
.bc-title-area{flex:1;min-width:0}
.bc-tier-badge{position:absolute;top:8px;right:10px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid;z-index:3;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.bc-tier-big{font-size:32px;font-weight:900;font-family:'Rajdhani',sans-serif;letter-spacing:-2px;opacity:0.18;align-self:flex-end;margin-bottom:2px;line-height:1;flex-shrink:0}
.vc-game{font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;font-weight:700}
.bc-name{font-size:18px;font-weight:700;line-height:1.1;margin-bottom:2px;letter-spacing:.3px}
.bc-sub{font-size:14px;color:#4a4a68;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-bottom{padding:7px 12px 10px}
.bc-row{display:flex;align-items:center;gap:8px}
.bc-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.bc-stats{display:flex;gap:8px;flex-shrink:0}
.vcs{display:flex;flex-direction:column;align-items:center;gap:2px}
.vcs-bar{width:26px;height:2px;border-radius:1px;background:rgba(255,255,255,0.06);overflow:hidden}
.vcs-fill{height:100%;border-radius:1px}
.vcs-l{font-size:11px;color:#3a3a58;letter-spacing:.3px;text-transform:uppercase}
.vcs-v{font-size:13px;font-weight:700;font-family:'Rajdhani',sans-serif}
.bcard-d2r:hover{box-shadow:0 4px 20px rgba(128,160,64,0.1)}

/* Card accent bar */
.bcard-accent{position:absolute;left:0;top:0;bottom:0;width:3px}

/* Card decorations */
.bc-hud-corner{
  position:absolute;top:8px;left:78px;
  font-size:10px;letter-spacing:3px;font-weight:700;
  opacity:0.35;font-family:'Rajdhani',sans-serif;
  text-transform:uppercase;
}
.bc-scanlines{position:absolute;inset:0;pointer-events:none;opacity:0.6}
.bc-deco{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.07}
.bc-deco svg{width:44px;height:44px}
.bc-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bc-stars span{position:absolute;width:1px;height:1px;background:rgba(255,255,255,0.5);border-radius:50%}
.bc-holo-bar{position:absolute;bottom:0;left:0;right:0;height:1px}
.bc-game-label{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:4px;font-weight:700;font-family:'Rajdhani',sans-serif;
}

/* Card inner */
.bcard-inner{padding:12px 12px 12px 15px;position:relative;z-index:1}
.bcard-top{display:flex;align-items:flex-start;gap:11px}
.bcard-emblem{
  width:48px;height:48px;border-radius:10px;
  border:1px solid;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.bcard-emblem svg{width:28px;height:28px}
.bcard-info{flex:1;min-width:0}
.bcard-name{
  font-family:'Rajdhani',sans-serif;
  font-size:19px;font-weight:700;
  letter-spacing:.3px;line-height:1.1;
  margin-bottom:2px;
}
.bcard-sub{font-size:13px;color:var(--muted);margin-bottom:5px;letter-spacing:.2px}
.bcard-tags{display:flex;flex-wrap:wrap;gap:4px}
.bcard-arrow{
  font-size:23px;color:var(--border2);
  padding-left:4px;transition:.2s;
  align-self:center;
}
.bcard:hover .bcard-arrow{color:var(--active-color)}

/* Mini stat bars */
.bcard-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
.mini-stat{display:flex;flex-direction:column;gap:2px}
.mini-lbl{font-size:11px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase}
.mini-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px;transition:.3s}
.mini-val{font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700}

/* Badges */
.badge{
  font-size:12px;padding:2px 7px;border-radius:4px;
  border:1px solid;font-weight:600;
  font-family:'Rajdhani',sans-serif;letter-spacing:.5px;
  text-transform:uppercase;
}
.badge-s{border-color:var(--s-tier);color:var(--s-tier);background:rgba(255,215,0,0.06)}
.badge-a{border-color:var(--a-tier);color:var(--a-tier);background:rgba(74,158,255,0.06)}
.badge-b{border-color:#64c864;color:#64c864;background:rgba(100,200,100,0.06)}
.btag-tier-b{background:rgba(100,200,100,.12);color:#64c864;border:1px solid rgba(100,200,100,.35)}
.tier-label{display:flex;align-items:center;gap:10px;padding:6px 0 4px;margin-top:8px}
.tier-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.tl-badge{font-family:'Rajdhani',sans-serif;font-weight:900;font-size:13px;padding:2px 10px;border-radius:4px;letter-spacing:1px}
.tl-s{background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.tl-a{background:rgba(74,154,255,.12);color:#4a9eff;border:1px solid rgba(74,154,255,.3)}
.tl-b{background:rgba(100,200,100,.12);color:#64c864;border:1px solid rgba(100,200,100,.3)}
.badge-dps{border-color:var(--red);color:var(--red);background:rgba(224,48,96,0.06)}
.badge-tank{border-color:var(--teal);color:var(--teal);background:rgba(47,184,180,0.06)}
.badge-pve{border-color:#60a060;color:#60a060;background:rgba(96,160,96,0.06)}
.badge-meta{border-color:var(--gold);color:var(--gold);background:rgba(232,168,32,0.06)}
.badge-dot{border-color:#c060ff;color:#c060ff;background:rgba(192,96,255,0.06)}
.badge-easy{border-color:#40c040;color:#40c040;background:rgba(64,192,64,0.06)}
.badge-medium{border-color:var(--gold);color:var(--gold);background:rgba(232,168,32,0.06)}
.badge-hard{border-color:var(--red);color:var(--red);background:rgba(224,48,96,0.06)}
.badge-boss{border-color:#ff8040;color:#ff8040;background:rgba(255,128,64,0.06)}
.badge-map{border-color:var(--teal);color:var(--teal);background:rgba(47,184,180,0.06)}
.badge-poe{border-color:var(--poe);color:var(--poe);background:rgba(212,136,58,0.06)}

/* ─── DETAIL PANEL ─── */
#detail{
  position:fixed;inset:0;
  background:var(--bg);
  z-index:100;
  display:none;flex-direction:column;
  transition:background .3s;
}
#detail.open{display:flex}
.dh{
  flex-shrink:0;
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.dh::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--active-color),transparent);
  opacity:0.3;
}
.dh-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.back-btn{
  padding:6px 12px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--s1);
  color:var(--text);font-size:19px;
  cursor:pointer;transition:.2s;line-height:1;
  font-family:'Rajdhani',sans-serif;font-weight:700;
}
.back-btn:hover{border-color:var(--active-color);color:var(--active-color)}
.dh-name{
  flex:1;font-family:'Rajdhani',sans-serif;
  font-size:23px;font-weight:700;color:var(--bright);
  letter-spacing:.5px;
}
.guide-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;
  border:1px solid var(--active-color);
  background:rgba(255,255,255,0.03);
  color:var(--active-color);
  font-size:14px;font-weight:700;
  text-decoration:none;
  font-family:'Rajdhani',sans-serif;letter-spacing:.5px;
  transition:.2s;text-transform:uppercase;
}
.guide-btn:hover{background:rgba(255,255,255,0.06)}
.dh-sub{font-size:14px;color:var(--muted);margin-bottom:8px;letter-spacing:.3px}
.dh-hero{display:flex;flex-wrap:wrap;gap:5px}
.detail-scroll{
  flex:1;overflow-y:auto;padding:14px 16px 24px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
.detail-scroll::-webkit-scrollbar{width:4px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Detail sections */
.ds{margin-bottom:16px}
.ds-title{
  font-family:'Rajdhani',sans-serif;font-size:14px;
  font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--active-color);margin-bottom:8px;
  padding-bottom:5px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ─── SEARCH OVERLAY ─── */
#search-ov{
  position:fixed;inset:0;background:rgba(8,8,16,0.96);
  z-index:200;display:none;flex-direction:column;
  backdrop-filter:blur(8px);
}
#search-ov.open{display:flex}
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  background:var(--s1);
  color:var(--muted);
}
#srch-in{
  flex:1;background:transparent;border:none;
  color:var(--bright);font-size:17px;
  font-family:'Exo 2',sans-serif;outline:none;
}
.srch-cancel{
  color:var(--active-color);font-size:15px;
  cursor:pointer;font-family:'Rajdhani',sans-serif;
  font-weight:700;letter-spacing:.5px;
}
#srch-results{flex:1;overflow-y:auto;padding:10px 14px}

/* ─── MECH CARD / DETAIL WIDGETS ─── */
.mech-card{background:var(--s2);border:1px solid var(--border);padding:12px;border-radius:8px;margin-bottom:8px}
.mech-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.mech-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mech-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:4px}
.mech-stack{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.mech-pip{width:10px;height:4px;background:var(--border2);border-radius:2px;transition:.2s}
.mech-pip.on{background:var(--active-color)}
.mech-desc{font-size:14px;color:var(--muted);line-height:1.5}

/* Gear cards in detail */
.gb-set{border-color:var(--set)!important;color:var(--set)!important}
.gb-named{border-color:var(--named)!important;color:var(--named)!important}
.gb-exotic{border-color:var(--exotic)!important;color:var(--exotic)!important}

/* Note boxes */
.note-box{padding:10px 12px;border-radius:6px;font-size:14px;line-height:1.5;margin-bottom:8px;border-left:3px solid}
.note-warn,.note-r{background:rgba(224,48,96,0.06);border-color:var(--red);color:#c05070}
.note-info,.note-t{background:rgba(47,184,180,0.06);border-color:var(--teal);color:#50a0a0}
.note-tip,.note-g{background:rgba(64,160,64,0.06);border-color:#50c050;color:#60a060}

/* Weapon cards */
.wpn-row{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.wpn-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px}
.wpn-card.exotic-w{border-color:rgba(232,168,32,0.3);background:linear-gradient(135deg,rgba(232,168,32,0.06),var(--s2))}
.wpn-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.wpn-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--bright);margin-bottom:2px}
.wpn-type{font-size:13px;color:var(--muted);margin-bottom:8px}
.wpn-talent{background:var(--s3);border-radius:4px;padding:8px}
.wpn-talent.gold-t{background:rgba(232,168,32,0.06);border:1px solid rgba(232,168,32,0.15)}
.talent-lbl{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.talent-txt{font-size:13px;color:var(--muted);line-height:1.5}

/* Skills grid */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.skill-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;gap:8px;align-items:flex-start}
.skill-ico{font-size:19px;flex-shrink:0;line-height:1}
.skill-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:3px}
.skill-desc{font-size:13px;color:var(--muted);line-height:1.4}

/* Options / choices */
.oc-rec{border-color:var(--gold);color:var(--gold);background:rgba(232,168,32,0.06)}
.oc-alt{border-color:var(--teal);color:var(--teal);background:rgba(47,184,180,0.06)}
.oc-free{border-color:var(--muted);color:var(--muted);background:rgba(255,255,255,0.03)}

/* Talent list */
.talent-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.trow{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:9px 11px}
.trow.gold{background:rgba(232,168,32,0.04);border-color:rgba(232,168,32,0.15)}
.src{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.tname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:3px}
.tdesc{font-size:13px;color:var(--muted);line-height:1.5}

/* Spec card */
.spec-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;gap:12px;margin-bottom:8px}
.spec-ico{font-size:32px;flex-shrink:0;line-height:1}
.spec-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;color:var(--bright);margin-bottom:4px}
.spec-desc{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.perks{display:flex;flex-wrap:wrap;gap:4px}
.perk{font-size:12px;padding:2px 7px;border:1px solid var(--border2);border-radius:4px;color:var(--muted);font-family:'Rajdhani',sans-serif}

/* Rotation steps */
.rotation-steps{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.rstep{display:flex;gap:10px;align-items:flex-start}
.rstep-n{
  width:24px;height:24px;border-radius:50%;
  border:1px solid var(--active-color);
  background:rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;
  color:var(--active-color);flex-shrink:0;margin-top:1px;
}
.rstep-body{flex:1}
.rstep-skill{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:2px}
.rstep-desc{font-size:13px;color:var(--muted);line-height:1.4}

/* Tips */
.tips{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.tip{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:14px;color:var(--muted);line-height:1.5}
.tip.gold{background:rgba(232,168,32,0.04);border-color:rgba(232,168,32,0.12)}
.tip.teal{background:rgba(47,184,180,0.04);border-color:rgba(47,184,180,0.12)}
.g{color:var(--gold)} .r{color:var(--red)} .t{color:var(--teal)}

/* Card grid */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.gear-card{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:6px;padding:9px 10px;transition:.15s}
.gear-card:hover{border-left-color:var(--active-color)}
.gear-card.named{border-left-color:var(--named)}
.gear-card.exotic{border-left-color:var(--exotic);background:rgba(232,168,32,0.04)}
.gear-slot{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.gear-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:5px}
.gear-mods{display:flex;flex-wrap:wrap;gap:3px}
.mod-tag{font-size:12px;padding:1px 6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);border-radius:3px}
.t-g{font-size:12px;padding:1px 6px;background:rgba(64,192,64,0.06);border:1px solid rgba(64,192,64,0.2);color:#50c050;border-radius:3px}
.t-r{font-size:12px;padding:1px 6px;background:rgba(224,48,96,0.06);border:1px solid rgba(224,48,96,0.2);color:#e03060;border-radius:3px}
.t-t{font-size:12px;padding:1px 6px;background:rgba(47,184,180,0.06);border:1px solid rgba(47,184,180,0.2);color:var(--teal);border-radius:3px}
.core-badge{font-size:11px;padding:1px 6px;border:1px solid;border-radius:3px;margin-bottom:4px;display:inline-block}
.core-red{border-color:var(--red);color:var(--red)}
.core-named{border-color:var(--named);color:var(--named)}
.core-exotic{border-color:var(--exotic);color:var(--exotic)}

/* SW grid */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sw-box{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px}
.sw-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sw-title.green{color:#50c050} .sw-title.red{color:var(--red)}
.sw-item{display:flex;gap:6px;font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:3px}
.sw-item span{color:var(--active-color);flex-shrink:0}

/* Phase boxes */
.phase{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--active-color);border-radius:6px;padding:12px;margin-bottom:8px}
.phase-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.phase-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--active-color);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--active-color);flex-shrink:0}
.phase-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright)}
.phase-sub{font-size:13px;color:var(--muted)}
.phase-desc{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.gem-list{display:flex;flex-direction:column;gap:4px}
.gem-row{display:flex;gap:8px;align-items:baseline;padding:5px 8px;background:var(--s3);border-radius:4px}
.gem-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;min-width:60px;flex-shrink:0}
.gem-supports{font-size:13px;color:var(--muted);line-height:1.4}
.passive-box{margin-top:8px;padding:7px 10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--muted);line-height:1.5}

/* Opt rows */
.opt-row{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.opt-badge{font-size:11px;padding:2px 6px;border:1px solid;border-radius:3px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.opt-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright);margin-bottom:2px}
.opt-desc{font-size:13px;color:var(--muted);line-height:1.4}

/* Weapon card rows */
.wc-row{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:9px;margin-bottom:5px;display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
.wc-ico{font-size:20px;line-height:1}
.wc-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bright)}
.wc-sub{font-size:12px;color:var(--muted)}
.wc-tag{font-size:12px;padding:2px 6px;border:1px solid var(--border2);border-radius:3px;color:var(--muted);font-family:'Rajdhani',sans-serif;text-align:center}
.wc-desc{grid-column:1/-1;font-size:13px;color:var(--muted);line-height:1.4;padding-top:4px;border-top:1px solid var(--border)}

/* ─── NEW DETAIL PANEL ─── */
#detail{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;transition:background .3s}
#detail.open{display:flex}
.dh{flex-shrink:0;padding:13px 16px 11px;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.05)}
.dh::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--active-color),transparent);opacity:0.4}
.dh-atmo{position:absolute;inset:0;pointer-events:none}
.dh-top{display:flex;align-items:center;gap:9px;margin-bottom:11px;position:relative;z-index:2}
.back-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;font-family:'Rajdhani',sans-serif;font-weight:700;transition:.15s;flex-shrink:0}
.back-btn:hover{border-color:var(--active-color);color:var(--active-color)}
.dh-name{flex:1;font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:var(--active-color);letter-spacing:.5px}
.guide-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid;font-size:12px;font-weight:700;text-decoration:none;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:.15s;flex-shrink:0;border-color:var(--active-color);color:var(--active-color);background:rgba(255,255,255,0.03)}
.guide-btn:hover{background:rgba(255,255,255,0.07)}
.dh-hero-row{display:flex;gap:12px;align-items:center;position:relative;z-index:2}
.build-icon-wrap{width:62px;height:62px;flex-shrink:0;border-radius:13px;border:1px solid;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:rgba(255,255,255,0.04)}
.build-icon-wrap svg{width:40px;height:40px}
.dh-info{flex:1;min-width:0}
.dh-class{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px;font-weight:700;opacity:0.7}
.dh-sub{font-size:13px;color:var(--muted);margin-bottom:5px}
.dh-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.stats-row{display:flex;gap:10px}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-val{font-size:15px;font-weight:700;font-family:'Rajdhani',sans-serif;line-height:1}
.stat-lbl{font-size:9px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase}

/* Detail tabs */
.detail-tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--border);background:#060608;overflow-x:auto;scrollbar-width:none}
.detail-tabs::-webkit-scrollbar{display:none}
.dtab{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.dtab:hover{background:rgba(255,255,255,0.03)}
.dtab.on{border-bottom-color:var(--active-color)}
.dtab-ico{width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.dtab-ico svg{width:14px;height:14px;color:var(--muted);transition:.2s}
.dtab.on .dtab-ico svg{color:var(--active-color)}
.dtab-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:700;color:var(--muted2);transition:.2s;white-space:nowrap}
.dtab.on .dtab-lbl{color:var(--active-color)}

/* Detail scroll + panes */
.detail-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.detail-scroll::-webkit-scrollbar{width:3px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.dpane{display:none;padding:13px 15px 22px}
.dpane.on{display:block}

/* Section headers */
.dsec-head{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.dsec-ico{width:26px;height:26px;border-radius:6px;border:1px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dsec-ico svg{width:13px;height:13px}
.dsec-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}

/* Skill rows */
.dskill{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;transition:.15s}
.dskill:hover{border-color:rgba(255,255,255,0.12)}
.dskill-ico{width:26px;height:26px;border-radius:6px;border:1px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dskill-ico svg{width:13px;height:13px}
.dskill-info{flex:1;min-width:0}
.dskill-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.dskill-desc{font-size:12px;color:var(--muted);line-height:1.3;margin-top:1px}
.dskill-tag{flex-shrink:0;font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.5px}
.gem-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.gem-chip{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--muted);font-family:'Rajdhani',sans-serif}

/* Notes */
.dnote{padding:8px 10px;border-radius:7px;font-size:12px;line-height:1.5;border-left:3px solid;margin-bottom:6px}
.dnote-warn{background:rgba(255,64,32,0.06);border-color:#FF4020;color:#c04020}
.dnote-buff{background:rgba(64,192,64,0.06);border-color:#40c040;color:#40a040}
.dnote-info{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);color:var(--muted)}

/* Phase/leveling */
.dphase-track{position:relative;padding-left:20px;margin-bottom:4px}
.dphase-track::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--active-color),rgba(255,100,30,0.4),transparent)}
.dphase{position:relative;margin-bottom:10px}
.dphase::before{content:'';position:absolute;left:-16px;top:5px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--active-color);background:var(--bg)}
.dphase-num{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--active-color);letter-spacing:.5px;margin-bottom:1px}
.dphase-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.dphase-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:5px}
.dphase-gems{display:flex;flex-direction:column;gap:2px}
.dpgem{display:flex;align-items:center;gap:6px;padding:4px 7px;background:var(--s1);border-radius:4px;border:1px solid var(--border)}
.dpgem-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text);min-width:100px}
.dpgem-sups{display:flex;flex-wrap:wrap;gap:2px}
.dpgem-s{font-size:10px;padding:1px 4px;border-radius:2px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-family:'Rajdhani',sans-serif}
.dpgem-s.hi{border-color:rgba(var(--active-r,200),var(--active-g,160),64,0.3);color:var(--active-color)}
.dphase-passive{font-size:11px;color:var(--muted2);margin-top:4px;padding-left:2px}

/* Gear rows */
.dgear{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--s1);border:1px solid var(--border);border-radius:6px;margin-bottom:3px}
.dgear.bis{border-color:rgba(255,215,0,0.2);background:rgba(255,215,0,0.02)}
.dgear-slot{font-size:10px;color:var(--muted2);width:46px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.dgear-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;flex:1}
.dgear-note{font-size:11px;color:var(--muted);flex:1}
.dgear-tag{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid;font-family:'Rajdhani',sans-serif;font-weight:700;flex-shrink:0}

/* Rotation */
.drot-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.drot-label::after{content:'';flex:1;height:1px;background:var(--border)}
.drot-step{display:flex;gap:9px;align-items:flex-start;margin-bottom:5px}
.drot-n{width:20px;height:20px;border-radius:50%;border:1px solid var(--active-color);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--active-color);flex-shrink:0;margin-top:1px}
.drot-skill{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:1px}
.drot-desc{font-size:12px;color:var(--muted);line-height:1.4}

/* Ascendancy grid */
.dasc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.dasc{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:9px}
.dasc-num{font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.dasc-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.dasc-desc{font-size:11px;color:var(--muted);line-height:1.4}

/* SW/overview grids */
.dsw-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.dsw-box{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:9px}
.dsw-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}

/* Patch items */
.dpatch{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;background:var(--s1);border:1px solid var(--border);border-radius:7px;margin-bottom:4px}
.dpatch-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dpatch-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.dpatch-desc{font-size:11px;color:var(--muted);line-height:1.4}

/* Tree phases */
.dtree{background:var(--s1);border:1px solid var(--border);border-left:2px solid var(--active-color);border-radius:6px;padding:8px 10px;margin-bottom:4px}

function gC(icon,slotType,slotLbl,badgeCls,name,badgeTxt,subLbl,desc,m1,m2){
  const ic={exotic:'ico-exotic',named:'ico-named',set:'ico-set',gem:'ico-gem',talent:'ico-talent',spec:'ico-spec'}[slotType]||'ico-set';
  return `<div class="gear-card">
    <div class="gear-card-left"><div class="gear-slot-icon ${ic}">${icon}</div><div class="slot-lbl">${slotLbl}</div></div>
    <div class="gear-body">
      <div class="gear-top"><div class="gear-name">${name}</div><span class="gbadge ${badgeCls}">${badgeTxt}</span></div>
      <div class="gear-talent-lbl">${subLbl}</div>
      <div class="gear-desc">${desc}</div>
      <div class="gear-mods">${m1?`<span class="gear-mod${m1.startsWith('+')||m1.includes('%')?' hot':''}">${m1}</span>`:''}${m2?`<span class="gear-mod">${m2}</span>`:''}</div>
    </div></div>`;
}
function wC(icon,name,type,crit,rpm,core,talentName,talentDesc){
  return `<div class="weapon-card">
    <div class="weapon-header">
      <div class="weapon-icon-box">${icon}</div>

    <div class="weapon-talent-box"><div class="wtb-name">${talentName}</div><div class="wtb-desc">${talentDesc}</div></div>
  </div>`;
}

function tagBadge(t){

function setAccent(game){
  const themes={
    poe2:  {color:'#d4883a',dim:'rgba(212,136,58,0.15)',bg:'#0e0a06',s1:'#140e08',s2:'#1a1208',glow:'rgba(212,136,58,0.06)',scan:'rgba(212,136,58,0.025)'},

    d4:    {color:'#CC2020',dim:'rgba(204,32,32,0.12)',bg:'#0c0505',s1:'#120808',s2:'#180b0b',glow:'rgba(204,32,32,0.07)',scan:'rgba(204,32,32,0.02)'},
    swtor: {color:'#4A9AE0',dim:'rgba(74,154,224,0.12)',bg:'#02050f',s1:'#060a16',s2:'#0a1020',glow:'rgba(74,154,224,0.06)',scan:'rgba(74,154,224,0.02)'},
    d2r:   {color:'#80A040',dim:'rgba(128,160,64,0.12)',bg:'#060808',s1:'#0a0e08',s2:'#0e1208',glow:'rgba(128,160,64,0.05)',scan:'rgba(128,160,64,0.02)'}
  };
  const t=themes[game]||themes.div2;
  const color=t.color, dim=t.dim;
  document.documentElement.style.setProperty('--active-color',color);
  document.documentElement.style.setProperty('--bg',t.bg);
  document.documentElement.style.setProperty('--s1',t.s1);
  document.documentElement.style.setProperty('--s2',t.s2);
  document.documentElement.style.setProperty('--s3',t.s2);
  document.documentElement.style.setProperty('--theme-glow',t.glow);
  document.body.style.background=t.bg;
  document.querySelector('.logo-icon').style.borderColor=color;
  document.querySelector('.logo-icon').style.background=dim;
  document.getElementById('logoAccentEl').style.color=color;
  const g=GAMES.find(x=>x.id===game);
  document.getElementById('logoIcon').textContent=g.icon;
}

function renderGameTabs(){
  const counts={}; GAMES.forEach(g=>{counts[g.id]=BUILDS.filter(b=>b.game===g.id).length;});
  document.getElementById('gameTabs').innerHTML=GAMES.map(g=>`
    <button class="gtab ${g.ac}${activeGame===g.id?' on':''}" onclick="setGame('${g.id}')">
      <div class="gtab-icon" style="color:${activeGame===g.id?'currentColor':'var(--muted)'}">${GAME_SVGS[g.id]||g.icon}</div>
      <div class="gtab-label">${g.label}</div>
      <div class="gtab-count">${counts[g.id]} builds</div>
    </button>`).join('');
  setTimeout(()=>{
    const el=document.querySelector('.gtab.on');
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}
function getFilters(){
  const base=[{id:'all',l:'All'},{id:'S',l:'S-Tier'},{id:'A',l:'A-Tier'},{id:'B',l:'B-Tier'}];
  const poe=[{id:'boss',l:'Bossing'},{id:'map',l:'Mapping'},{id:'easy',l:'Easy'},{id:'hard',l:'Complex'}];
  const div=[{id:'boss',l:'Bossing'},{id:'map',l:'Mapping'},{id:'dmg',l:'High DMG'},{id:'def',l:'Tanky'},{id:'easy',l:'Easy'},{id:'medium',l:'Medium'}];
  return [...base,...(activeGame==='poe2'?poe:div)];
}

function renderFilters(){
  document.getElementById('filterBar').innerHTML=getFilters().map(f=>`
    <button class="chip${activeFilters.includes(f.id)||(f.id==='all'&&!activeFilters.length)?' on':''}" onclick="toggleFilter('${f.id}')">${f.l}</button>`).join('');
}

function matches(b){
  if(!activeFilters.length) return true;
  return activeFilters.every(f=>{
    if(f==='S'||f==='A'||f==='B') return b.tier===f;
    if(f==='easy'||f==='medium'||f==='hard') return b.diff===f;
    return b.tags.includes(f);
  });
}

function buildCard(b){
  const allTags=[tierBadge(b.tier),diffBadge(b.diff),...b.tags.map(tagBadge)].join('');
  const bars=b.stats.map(s=>`
    <div class="vcs">
      <div class="vcs-bar"><div class="vcs-fill" style="width:${s.v}%;background:${s.c}"></div></div>
      <div class="vcs-l">${s.l}</div>
      <div class="vcs-v" style="color:${s.c}">${Math.round(s.v/20)}★</div>
    </div>`).join('');

  const ac=b.accent;
  const buildIcon=BUILD_SVGS[b.id]||GAME_SVGS[b.game]||'';
  const gameIcon=GAME_SVGS[b.game]||'';

  const bgDeco=BUILD_BGDECO[b.id]||{
    div2:`<div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,${ac}05 3px,${ac}05 4px)"></div>`,
    poe2:`<div style="position:absolute;right:-8px;top:-5px;width:100px;height:100px;opacity:0.06;color:${ac}">${gameIcon}</div>`,
    d4:`<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,${ac}14 0%,transparent 60%)"></div><div style="position:absolute;right:-8px;top:-5px;width:100px;height:100px;opacity:0.06;color:${ac}">${gameIcon}</div>`,
    swtor:`<div style="position:absolute;inset:0;overflow:hidden"><span style="position:absolute;width:1.5px;height:1.5px;background:rgba(255,255,255,0.6);border-radius:50%;top:20%;left:15%"></span><span style="position:absolute;width:1px;height:1px;background:rgba(255,255,255,0.5);border-radius:50%;top:60%;left:78%"></span><span style="position:absolute;width:1px;height:1px;background:rgba(255,255,255,0.4);border-radius:50%;top:35%;left:88%"></span><span style="position:absolute;width:2px;height:2px;background:${ac}80;border-radius:50%;top:70%;left:40%"></span></div>`,
    d2r:`<div style="position:absolute;right:-8px;top:-5px;width:100px;height:100px;opacity:0.06;color:${ac}">${gameIcon}</div>`
  }[b.game]||'';

  const gameLabel={
    div2:`<div class="vc-game" style="color:${ac}88">▶ THE DIVISION 2</div>`,
    poe2:`<div class="vc-game" style="color:${ac}88;font-style:italic">~ PATH OF EXILE 2</div>`,
    d4:`<div class="vc-game" style="color:${ac}88">⸸ DIABLO 4</div>`,
    swtor:`<div class="vc-game" style="color:${ac}88">⬡ STAR WARS: TOR</div>`,
    d2r:`<div class="vc-game" style="color:${ac}88;font-family:Georgia,serif">☽ DIABLO 2: RESURRECTED</div>`
  }[b.game]||'';

  const nameFont=(b.game==='poe2'||b.game==='d2r')?'font-family:Georgia,serif':'font-family:Rajdhani,sans-serif';
  const nameColor=b.game==='poe2'?ac:b.game==='d2r'?ac:'#fff';

  return `<div class="bcard bcard-${b.game}" onclick="openDetail('${b.id}')" style="border-color:${ac}20">
    <div class="bcard-accent" style="background:linear-gradient(180deg,${ac},${ac}40)"></div>

    <!-- Banner top -->
    <div class="bc-top" style="background:linear-gradient(135deg,${ac}18 0%,transparent 60%)">
      ${bgDeco}
      <div class="bc-tier-badge" style="background:${b.tier==='S'?'rgba(255,215,0,0.1)':'rgba(74,158,255,0.1)'};border-color:${b.tier==='S'?'rgba(255,215,0,0.3)':'rgba(74,158,255,0.3)'};color:${b.tier==='S'?'#FFD700':'#4a9eff'}">${b.tier}-TIER</div>
      <div class="bc-top-inner">
        <div class="bc-icon-wrap" style="background:${ac}14;border-color:${ac}35;color:${ac}">${buildIcon}</div>
        <div class="bc-title-area">
          ${gameLabel}
          <div class="bc-name" style="${nameFont};color:${nameColor}">${b.name}</div>
          <div class="bc-sub">${b.sub}</div>
        </div>
        <div class="bc-tier-big" style="color:${ac}">${b.tier}</div>
      </div>
    </div>

    <!-- Divider -->
    <div style="height:1px;background:linear-gradient(90deg,transparent,${ac}40,transparent)"></div>

    <!-- Bottom: tags + stats -->
    <div class="bc-bottom">
      <div class="bc-row">
        <div class="bc-tags">${allTags}</div>
        <div class="bc-stats">${bars}</div>
      </div>
    </div>
  </div>`;
}
function renderList(builds){
  const el=document.getElementById('listScroll');
  if(!builds.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>No builds found</div>`;return;}
  const s=builds.filter(b=>b.tier==='S'),a=builds.filter(b=>b.tier==='A'),bt=builds.filter(b=>b.tier==='B');
  let h='';
  if(s.length) h+=`<div class="tier-label"><span class="tl-badge tl-s">S</span></div>`+s.map(buildCard).join('');
  if(a.length) h+=`<div class="tier-label"><span class="tl-badge tl-a">A</span></div>`+a.map(buildCard).join('');
  if(bt.length) h+=`<div class="tier-label"><span class="tl-badge tl-b">B</span></div>`+bt.map(buildCard).join('');
  el.innerHTML=h;
}

  'poe-pb':{"mechanic": "Poison scales with Physical + Chaos Hit Damage. Overwhelming Toxicity doubles maximum Poison stack count. Herald of Plague spreads strongest Poison to nearby enemies. Herald of Blood fires chain explosions on Bleed — the one-button clear. Play Poison from Level 1, no build swap needed.", "strengths": ["One-button mapping in endgame", "Immune to all Slow effects (Relentless Pursuit)", "No budget required to start", "Chaos Damage ignores elemental resistances", "Excellent single target via Toxic Growth"], "weaknesses": ["Mana management important early", "Needs a good bow", "Boss rotation slightly more complex", "Plaguefinger for optimal scaling", "⚠ Nerfed in 0.5.0 — Poison Duration reduced"], "ascendancy": [["① Act 2", "Overwhelming Toxicity", "Doubles maximum Poison stack count. Core of the build."], ["② Act 2", "Relentless Pursuit", "Immune to all Slow effects."], ["③ Act 4", "Path Seeker", "+5 Passive Skill Points."], ["④ Trial of Chaos", "Burning Bright", "Poison spreads to nearby enemies on death."]], "skills": [["Poisonburst Arrow", "Primary clear · Chaos + Physical DoT · Poison stacks", "#60A030", "CORE", ["Concentrated Area", "Escalating Poison", "Pierce"]], ["Toxic Growth", "Boss single target · Pustule DoT clusters", "#60A030", "BOSS", ["Nova Projectiles", "Unleash"]], ["Gas Arrow", "Detonate Toxic Growth pustules · AoE burst", "#60A030", "BURST", ["Conc. Area", "Unleash"]], ["Herald of Plague", "Spreads strongest active Poison to nearby enemies", "#60A030", "PASSIVE", []], ["Herald of Blood", "Chain explosions on Bleed · One-button clear", "#A04040", "PASSIVE", []], ["Vine Arrow", "Slow + DoT + gets poisoned · Use on bosses", "#40A040", "UTILITY", ["Swift Affliction"]]], "gear": [["Weapon", "High pDPS Bow (Rare)", "High Physical DPS + Added Chaos Damage · Attack Speed", "BiS", "#60A030", true], ["Gloves", "Plaguefinger (Unique)", "Grants +2 Poisonburst Arrow · Mandatory for optimal scaling", "BiS", "#FFD700", true], ["Helmet", "Ev   'poe-is':{"warn": "Ice Shot unlocks at level 31. Level with Lightning Arrow until then.", "mechanic": "Freeze packs with Ice Shot → Herald of Ice shatters chain-clear the screen. On bosses: freeze → Mirage Deadeye channels Snipe automatically → Icy Blast deals ~3,067% weapon damage. You move freely the entire time.", "strengths": ["Mirage Deadeye + Snipe = boss one-shots without standing still", "Herald of Ice = instant screen-wide clear", "Freeze = enemies can't attack = best defense in game", "Deflect (Evasion-based, new in 0.5) + freeze = near-invulnerable", "No required Uniques for T15+", "S-Tier ascendancy unchanged — Gathering Winds, Far Shot all intact"], "weaknesses": ["Ice Shot locked until level 31", "25% less freeze buildup in 0.5 (negligible in practice)", "Chain clear slightly slower than Lightning Arrow", "BiS gear (Hyrri's Ire, Cadiro's Gambit) requires farming"], "ascendancy": [["① Point Blank", "Projectile Proximity Specialisation", "Shots deal more damage the closer you are. Take FIRST — enables Snipe one-shots immediately."], ["② Endless Munitions", "Endless Munitions", "+2 Ice Shot projectiles, each spawning its own explosion. Doubles map clear."], ["③ Gathering Winds", "Gathering Winds", "Tailwind on Kill +10% action speed. Taken third — Tailwind can interfere with Snipe timing."], ["④ Mirage Deadeye", "Mirage Deadeye", "Clone fires Ice Shot automatically. Snipe is played manually as a boss finisher."]], "skills": [["Ice Shot", "Core clear. Fork splits projectiles for faster freeze buildup. Cold Attunement added in mid-game.", "#20a0d0", "CORE", ["Elemental Armament II", "Ice Bite II", "Rapid Attacks II", "Fork → Cold Attunement"]], ["Snipe", "Manual boss finisher. You channel Snipe yourself on frozen bosses. Close Combat II + Point Blank = massive Icy Blast.", "#60c8ff", "BOSS", ["Elemental Armament II", "Concentrated Area", "Elemental Focus", "Window of Opportunity II", "Close Combat II"]], ["Freezing Mark", "On Weapon Set 2. Boss mark for single-target freeze buildup. Eternal Mark = permanent.", "#80a0c0", "SET 2", ["Mark of Siphoning II", "Charged Mark", "Eternal Mark"]], ["Tornado Shot", "Secondary AoE clear. Overabundance II increases tornado density.", "#4090b0", "AoE", ["Prolonged Duration II", "Overabundance II", "Durability"]], ["Herald of Ice", "Shatters chain on frozen kills. Longshot II + Cold Attunement boost cold damage.", "#20a0d0", "AURA", ["Magnified Area II", "Elemental Armament II", "Longshot II", "Cold Attunement"]], ["Barrage", "Frenzy Charge generator. Perpetual Charge maintains charges.", "#5070a0", "CHARGES", ["Cooldown Recovery II", "Perpetual Charge", "Rapid Casting II"]], ["Combat Frenzy", "Consumes Frenzy Charges for burst damage. Use before Snipe.", "#5070a0", "BURST", ["Charge Profusion II"]], ["Mirage Archer", "Fires Ice Shot automatically for continuous freeze.", "#4090c0", "CLONE", ["Ice Shot", "Elemental Armament II", "Deliberation", "Rapid Attacks II"]], ["Mirage Deadeye", "Second clone, also fires Ice Shot. Snipe is manual — not automatic.", "#4090c0", "CLONE", ["Ice Shot", "Elemental Armament II", "Deliberation", "Rapid Attacks II"]]], "gear": [["Weapon", "Woe Strike Bow (Rare)", "Cold Projectile Damage · Crit Chance · Crit Multiplier · Attack Speed", "BiS", "#20a0d0", true], ["Quiver", "Cadiro's Gambit", "Build-defining — Crescendo, Splinter, Reversing, Diamond arrows. 3-4x DPS multiplier.", "BiS", "#60c8ff", true], ["Body", "Hyrri's Ire", "Doubles Evasion · Adds Cold Damage · Extends Freeze Duration. Best-in-slot despite minor 0.5 nerf.", "BiS", "#20a0d0", false], ["Helm", "Kamasan Tiara (Rare)", "Evasion · Cold Damage · Freeze Duration · Crit", "RARE", "#20a0d0", false], ["Gloves", "Secured Wraps (Rare)", "Evasion · Attack Speed · Freeze scaling · Dexterity", "RARE", "#20a0d0", false], ["Boots", "Dragonscale Boots (Rare)", "Movement Speed · Evasion · Resistances · Cooldown Recovery", "RARE", "#20a0d0", false]], "gear_note": "Priority: Cold Damage bow → Cadiro's Gambit → Hyrri's Ire → cap resistances. Runeforging: destroy Unique bows for Cold Damage runes.", "rotation": [["🗺 MAP CLEAR", "#50c8b4", [["Ice Shot into pack", "Cold explosion freezes entire group."], ["Herald of Ice triggers", "Shatter chains → screen cleared instantly."], ["Move forward", "Mana Remnants refill from kill drops. Keep running."]]], ["⚔ BOSS ROTATION", "#FF8C00", [["Freezing Salvo", "Guarantee initial freeze buildup."], ["Ice Shot → maintain freeze", "Keep boss frozen throughout fight."], ["Mirage channels Snipe", "Automatic — Icy Blast triggers on freeze."], ["~3,067% damage", "Boss dead. If not: re-freeze and repeat."]]]], "rot_note": "💡 You never channel Snipe manually. Mirage Deadeye does it. Your only job is keeping the boss frozen with Ice Shot.", "patch_note": "✅ 0.5 Meta Build — Stronger in 0.5 than 0.4 due to Mirage Deadeye + Snipe buff. Deadeye ascendancy unchanged. S-Tier confirmed.", "patch_class": "dnote-buff", "patch": [["buff", "🟢 Mirage Deadeye + Snipe", "Channels Snipe automatically while you move freely. Game-changer."], ["buff", "🟢 Deflect added", "Evasion now reduces damage taken. Biggest survivability buff for Deadeye."], ["nerf", "🟡 Ice Shot -25% freeze buildup", "Negligible — freeze uptime still near 100% in practice."], ["buff", "🟢 Snipe endgame buffed", "Level 20+ Snipe deals more damage than 0.4. Net positive for endgame."]]},
  'poe-la':{"mechanic": "Lightning Arrow hits → beams arc to 3 enemies → Freeze + Shock → kill → Herald of Thunder chain explosion → clears entire screens. Plant Lightning Rods at boss feet → fire Lightning Arrow at Rods → devastating burst. Mirage Archer fires a free copy of your attacks. #1 most played build in PoE2.", "strengths": ["S-Tier League Starter — no gear required", "Fastest campaign clear in the game", "Screen-wide clear via chaining beams", "Herald of Thunder chain explosions", "Lightning Rod for massive single-target burst", "Mirage Deadeye = free copy of your attacks"], "weaknesses": ["Kite-dependent defense — never stand still", "Mana sustain requires investment", "Lightning Rod requires stationary target", "High-end gear expensive (bow-specific)", "Beams no longer chain same target (0.5.0)"], "ascendancy": [["① First Pick", "Gathering Winds", "Tailwind on Kill = stacking Action Speed. Powers constant crits."], ["② Priority", "Mirage Archer", "Creates copy that fires your attacks for free. Doubles Lightning Arrow output."], ["③ Bullseye", "10 Critical Weakness stacks", "Permanent massive Crit multiplier via constant crits."], ["④ Focal Point", "Projectile Convergence", "Arrows converge on target. Massive single-target DPS boost."]], "skills": [["Lightning Arrow", "Main clear · Chains beams to 3 enemies · Freeze + Shock", "#4A9AE0", "CORE", ["Fork", "Overpower", "Lightning Penetration"]], ["Lightning Rod", "Boss burst · Plant at boss feet · Fire Arrow at Rod", "#4A9AE0", "BOSS", ["Concentrated Effect", "Lightning Penetration"]], ["Tornado Shot", "Single-target finisher · Homing tornado", "#C8A040", "ST", ["Added Lightning", "Overpower"]], ["Herald of Thunder", "Passive · Triggers on shocked kill · Chain explosions", "#4A9AE0", "PASSIVE", []], ["Lightning Aegis", "Damage reduction on Crit — near permanent via Deadeye", "#4A9AE0", "DEFENSE", []], ["Ghost Dance", "Evasion → ES restore on hit · Survival", "#50c8b4", "DEFENSE", []], ["Voltaic Mark", "Boss   'div-hb':{"mechanic": "Heartstopper: headshots mark enemies, every hit grants +1% Bonus Armor and +1% WD (max 100 stacks = +100% BA + +100% WD). Kingbreaker + Linked Laser Pointer = every hit auto-marks. Memento Kill Confirmed adds +30% WD long-term.", "strengths": ["S-Tier DPS + Survivability combined", "Stacks build naturally while shooting", "Kingbreaker Perfect Flatline synergy", "Very high skill ceiling but forgiving baseline"], "weaknesses": ["Kingbreaker is very rare (farm heavy)", "Stack decay — 2 stacks lost per second", "Linked Laser Pointer required on both weapons", "Less effective vs enemies that move"], "ascendancy": [["Specialization", "Technician", "Linked Laser Pointer bonus + extra Skill Tier + 10% Repair Skill."], ["Skill 1", "Pulse", "Headshot marks enemies. With LLP: every hit marks automatically."], ["Skill 2", "Crusader Shield", "Damage + mobility. Boosted by Technician extra Skill Tier."], ["Skill 3", "Artificer Hive", "Repair hive — boosted by Technician."]], "skills": [["Kingbreaker AR", "Primary · Named · Perfect Flatline +20% WD vs marked enemies", "#CC2020", "EXOTIC", ["Long Optics", "Extended Magazine", "Linked Laser Pointer"]], ["ACS-12 Shotgun", "Secondary · Fast stack rebuild", "#FF8080", "SECONDARY", []], ["Pulse", "Auto-marks enemies · Required for stack generation", "#CC2020", "SKILL", []], ["Crusader Shield", "Damage + mobility", "#E8A820", "SKILL", []]], "gear": [["Mask", "Heartbreaker Set", "Set Piece 1 · Red Core · Weapon Damage + Crit Chance", "SET", "#3a8fff", false], ["Chest", "Brand Piece (Obliterate)", "Obliterate talent · +1% WD per Crit hit · Red Core", "BRAND", "#3a8fff", false], ["Backpack", "Memento Exotic", "Kill Confirmed +30% WD · Tri-Core", "EXOTIC", "#FFD700", true], ["Gloves", "Heartbreaker Set", "Set Piece 2 · Red Core · Crit Chance + Crit Damage", "SET", "#3a8fff", false], ["Holster", "Heartbreaker Set", "Set Piece 3 · Red Core", "SET", "#3a8fff", false], ["Kneepads", "Fox's Prayer Named", "Clutch armor res   'div-se':{"mechanic": "Actum Est: every hit grants +1 stack. At 100 stacks the next magazine loads with shock rounds that stun enemies and deal additional damage. Striker's Gamble stacks (+5% WD per kill up to +200%) provide sustained high weapon damage. 70+1 round magazine = largest in the game. #1 PvE DPS Build in The Division 2 (2026 Meta).", "strengths": ["#1 PvE DPS Build (2026 Meta)", "St. Elmo's + Striker = strongest DPS combination", "70+1 round magazine = largest in game", "Shock rounds stun enemies + 50% armor ignore", "Works in Legendary, Summit, Countdown"], "weaknesses": ["St. Elmo's is an Exotic — 1-exotic rule applies", "100 stack buildup before shock round window", "Less tanky than survivability builds"], "ascendancy": [["Specialization", "Gunner", "Increased LMG/AR handling · Armor on kills · Fire Rate on kills."], ["Talent", "Thunder Strike", "+30% damage on stunned enemies — pairs with shock rounds."], ["Skill 1", "Assault Turret", "Additional DPS platform for stationary bosses."], ["Skill 2", "Ballistic Shield", "Alternative for Legendary survivability."]], "skills": [["St. Elmo's Engine", "Primary · Exotic SMG · Actum Est shock mechanic · 70+1 Magazine", "#E8A820", "EXOTIC", []], ["Backup AR", "Secondary · GR9 · Thunder Strike or Fast Hands", "#E8A820", "SECONDARY", []], ["Assault Turret", "Auto-attack DPS platform", "#E8A820", "SKILL", []]], "gear": [["Primary", "St. Elmo's Engine", "Exotic SMG · Actum Est · 70+1 Mag · Shock Rounds at 100 stacks", "EXOTIC", "#FFD700", true], ["Secondary", "GR9 or any AR", "Thunder Strike or Fast Hands · Backup weapon", "AR", "#E8A820", false], ["Mask", "Striker's Battlegear", "Set Piece 1 · Red Core · Weapon Damage + Crit Chance", "SET", "#3a8fff", false], ["Chest", "Brand Piece (Obliterate)", "Obliterate talent (+1% WD per Crit) · Red Core", "BRAND", "#3a8fff", false], ["Backpack", "Memento Exotic", "Kill Confirmed +30% WD · Tri-Core", "EXOTIC", "#FFD700", true], ["Gloves", "Striker's Battlegear", "Set Piece function renderAll(){
  setAccent(activeGame);
  renderGameTabs();
  renderFilters();
  renderList(BUILDS.filter(b=>b.game===activeGame&&matches(b)));
}

function setGame(g){activeGame=g;activeFilters=[];document.getElementById('listScroll').scrollTop=0;renderAll();}
function toggleFilter(f){
  if(f==='all'){activeFilters=[];}
  else{const i=activeFilters.indexOf(f);if(i>-1)activeFilters.splice(i,1);else activeFilters.push(f);}
  renderAll();
}

function openDetail(id){
  const b=BUILDS.find(x=>x.id===id);if(!b) return;
  const ac=b.accent;

  // Set CSS var
  document.getElementById('detail').style.setProperty('--active-color',ac);

  // Update header
  document.getElementById('dhName').textContent=b.name;
  document.getElementById('dhName').style.color=ac;
  document.getElementById('dhClass').textContent=GAME_LABELS[b.game]||b.game.toUpperCase();
  document.getElementById('dhClass').style.color=ac;
  document.getElementById('dhSub').textContent=b.sub;

  // Atmospheric bg
  const atmo=document.getElementById('dhAtmo');
  atmo.style.background=`radial-gradient(ellipse at 100% 0%,${ac}20 0%,transparent 50%),radial-gradient(ellipse at 0% 100%,${ac}10 0%,transparent 50%)`;

  // Header border
  document.querySelector('#detail .dh').style.borderBottomColor=`${ac}30`;

  // Guide button
  const btn=document.getElementById('guideBtn');
  if(b.guide){btn.href=b.guide;btn.style.display='flex';btn.style.borderColor=`${ac}50`;btn.style.color=ac;}
  else{btn.style.display='none';}

  // Build icon wrap
  const wrap=document.getElementById('dhIconWrap');
  wrap.style.borderColor=`${ac}40`;
  wrap.style.background=`${ac}12`;

  // Animated icon
  document.getElementById('dhAnimIcon').innerHTML=getBuildAnimIcon(b.id,ac);

  // Badges
  document.getElementById('dhHero').innerHTML=[tierBadge(b.tier),diffBadge(b.diff),...b.tags.map(tagBadge)].join('');

  // Stats
  document.getElementById('dhStats').innerHTML=b.stats.map(s=>`
    <div class="stat-item">
      <div class="stat-val" style="color:${s.c}">${Math.round(s.v/20)}★</div>
      <div class="stat-lbl">${s.l}</div>
    </div>`).join('');

  // Build tabs + content
  buildDetailContent(b,ac);

  // Show
  document.getElementById('detail').classList.add('open');
  window.scrollTo(0,0);
}

function buildDetailContent(b,ac){
  // Build tabs
  const TABS=[
    {id:'overview',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>',label:'Overview'},
    {id:'skills',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',label:'Skills'},
    {id:'leveling',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',label:'Leveling'},
    {id:'tree',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4M12 11l-5 6M12 11l5 6"/></svg>',label:'Tree'},
    {id:'gear',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',label:'Gear'},
    {id:'rotation',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',label:'Rotation'},
    {id:'patch',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',label:'Patch'},
  ];
  document.getElementById('detailTabs').innerHTML=TABS.map((t,i)=>`
    <div class="dtab${i===0?' on':''}" onclick="switchDTab(this,'${t.id}')" data-pane="${t.id}">
      <div class="dtab-ico">${t.icon}</div>
      <div class="dtab-lbl">${t.label}</div>
    </div>`).join('');

  // Build panes
  const scroll=document.getElementById('detailScroll');
  scroll.innerHTML=TABS.map(t=>`<div class="dpane${t.id==='overview'?' on':''}" id="dpane-${t.id}"></div>`).join('');

  // Load ds data
  b.ds=DS_DATA[b.id]||{};
  // Fill each pane
  fillOverview(b,ac);
  fillSkills(b,ac);
  fillLeveling(b,ac);
  fillTree(b,ac);
  fillGear(b,ac);
  fillRotation(b,ac);
  fillPatch(b,ac);
  scroll.scrollTop=0;
}

function switchDTab(el,paneId){
  const detail=document.getElementById('detail');
  const ac=getComputedStyle(detail).getPropertyValue('--active-color').trim();
  detail.querySelectorAll('.dtab').forEach(t=>{
    t.classList.remove('on');
    const svg=t.querySelector('.dtab-ico svg');
    if(svg) svg.style.color='var(--muted)';
  });
  el.classList.add('on');
  const svg=el.querySelector('.dtab-ico svg');
  if(svg) svg.style.color=ac;
  detail.querySelectorAll('.dpane').forEach(p=>p.classList.remove('on'));
  const pane=document.getElementById('dpane-'+paneId);
  if(pane){pane.classList.add('on');}
  document.getElementById('detailScroll').scrollTop=0;
}

/* ─ Helper renderers ─ */
function secHead(title,icon,ac){
  return `<div class="dsec-head">
    <div class="dsec-ico" style="border-color:${ac}30;background:${ac}08;color:${ac}">${icon}</div>
    <div class="dsec-title" style="color:${ac}">${title}</div>
  </div>`;}

function fillOverview(b,ac){
  const el=document.getElementById('dpane-overview');
  if(!el) return;
  const ds=b.ds||{};
  const mechanic=ds.mechanic||b.sub;
  const str=ds.strengths||[];
  const wk=ds.weaknesses||[];
  const asc=ds.ascendancy||[];
  let h='';
  if(ds.warn) h+=`<div class="dnote dnote-warn" style="margin-bottom:10px">⚠ ${ds.warn}</div>`;
  h+=secHead('Core Mechanic','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22C12 22 4 16 4 10a8 8 0 0 1 16 0c0 6-8 12-8 12z"/></svg>',ac);
  h+=`<p style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px;padding:0 2px">${mechanic}</p>`;
  if(str.length||wk.length){
    h+=secHead('Strengths & Weaknesses','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',ac);
    h+=`<div class="dsw-grid" style="margin-bottom:12px">
      <div class="dsw-box"><div class="dsw-title" style="color:#40c040">✓ Strengths</div><div style="font-size:10px;color:var(--muted);line-height:1.7">${str.map(s=>s+'<br>').join('')}</div></div>
      <div class="dsw-box"><div class="dsw-title" style="color:#FF4020">✗ Weaknesses</div><div style="font-size:10px;color:var(--muted);line-height:1.7">${wk.map(w=>w+'<br>').join('')}</div></div>
    </div>`;}
  if(asc.length){
    h+=secHead('Ascendancy','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',ac);
    h+=`<div class="dasc-grid">${asc.map(([num,name,desc])=>`
      <div class="dasc"><div class="dasc-num">${num}</div>
      <div class="dasc-name" style="color:${ac}">${name}</div>
      <div class="dasc-desc">${desc}</div></div>`).join('')}</div>`;}
  if(ds.extra) h+=`<div class="dnote dnote-info">${ds.extra}</div>`;
  el.innerHTML=h;
}

function fillSkills(b,ac){
  const el=document.getElementById('dpane-skills');
  if(!el) return;
  const ds=b.ds||{};
  const skills=ds.skills||[];
  let h=secHead('Active Skills','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',ac);
  skills.forEach(([name,desc,color,tag,gems])=>{
    h+=`<div class="dskill">
      <div class="dskill-ico" style="border-color:${color}40;background:${color}10;color:${color}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div class="dskill-info">
        <div class="dskill-name">${name}</div>
        <div class="dskill-desc">${desc}</div>
        ${gems&&gems.length?`<div class="gem-chips">${gems.map(g=>`<span class="gem-chip">${g}</span>`).join('')}</div>`:''}
      </div>
      <span class="dskill-tag" style="color:${color};border-color:${color}30">${tag}</span>
    </div>`; });
  if(ds.skill_note) h+=`<div class="dnote dnote-info" style="margin-top:8px">💡 ${ds.skill_note}</div>`;
  el.innerHTML=h;
}

function fillLeveling(b,ac){
  const el=document.getElementById('dpane-leveling');
  if(!el) return;
  const phases=(b.ds&&b.ds.leveling)||[];
  if(!phases.length){el.innerHTML=`<div class="dnote dnote-info">See Full Guide for detailed leveling information.</div>`;return;}
  let h=`<div class="dphase-track">`;
  phases.forEach(([num,title,desc,gems,passive])=>{
    h+=`<div class="dphase">
      <div class="dphase-num">${num}</div>
      <div class="dphase-title">${title}</div>
      <div class="dphase-desc">${desc}</div>
      <div class="dphase-gems">${gems.map(([name,sups])=>`
        <div class="dpgem">
          <div class="dpgem-name">${name}</div>
          <div class="dpgem-sups">${sups.map(s=>`<span class="dpgem-s">${s}</span>`).join('')}</div>
        </div>`).join('')}</div>
      ${passive?`<div class="dphase-passive">▸ ${passive}</div>`:''}
    </div>`; });
  h+='</div>';
  el.innerHTML=h;
}

function fillTree(b,ac){
  const el=document.getElementById('dpane-tree');
  if(!el) return;
  const tree=(b.ds&&b.ds.tree)||[];
  let h=secHead('Passive Tree Priority','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4M12 11l-5 6M12 11l5 6"/></svg>',ac);
  if(b.ds&&b.ds.tree_note) h+=`<div class="dnote dnote-info" style="margin-bottom:10px">ℹ ${b.ds.tree_note}</div>`;
  tree.forEach(([range,desc,pts])=>{
    h+=`<div class="dtree"><div class="dtree-range" style="color:${ac}">${range}</div><div class="dtree-desc">${desc}</div>${pts?`<div class="dtree-pts">${pts}</div>`:''}</div>`;});
  el.innerHTML=h;
}

function fillGear(b,ac){
  const el=document.getElementById('dpane-gear');
  if(!el) return;
  const gear=(b.ds&&b.ds.gear)||[];
  let h=secHead('Equipment','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',ac);
  gear.forEach(([slot,name,note,tag,color,bis])=>{
    h+=`<div class="dgear${bis?' bis':''}">
      <div class="dgear-slot">${slot}</div>
      <div><div class="dgear-name" style="color:${bis?'#E8C840':color}">${name}</div><div class="dgear-note">${note}</div></div>
      <span class="dgear-tag" style="color:${color};border-color:${color}30">${tag}</span>
    </div>`;});
  if(b.ds&&b.ds.gear_note) h+=`<div class="dnote dnote-info" style="margin-top:8px">📊 ${b.ds.gear_note}</div>`;
  el.innerHTML=h;
}

function fillRotation(b,ac){
  const el=document.getElementById('dpane-rotation');
  if(!el) return;
  const rot=(b.ds&&b.ds.rotation)||[];
  let h='';
  rot.forEach(([label,color,steps])=>{
    h+=`<div class="drot-label" style="color:${color}">${label}</div>`;
    steps.forEach(([skill,desc],i)=>{
      h+=`<div class="drot-step"><div class="drot-n" style="border-color:${color};color:${color}">${i+1}</div>
        <div><div class="drot-skill">${skill}</div><div class="drot-desc">${desc}</div></div></div>`;});
    h+='<div style="margin-bottom:12px"></div>';});
  if(b.ds&&b.ds.rot_note) h+=`<div class="dnote dnote-info">${b.ds.rot_note}</div>`;
  el.innerHTML=h;
}

function fillPatch(b,ac){
  const el=document.getElementById('dpane-patch');
  if(!el) return;
  const items=(b.ds&&b.ds.patch)||[];
  const note=(b.ds&&b.ds.patch_note)||'';
  const cls=(b.ds&&b.ds.patch_class)||'dnote-info';
  let h='';
  if(note) h+=`<div class="dnote ${cls}" style="margin-bottom:10px">${note}</div>`;
  items.forEach(([type,title,desc])=>{
    const col=type==='buff'?'#40c040':type==='warn'?'#FF4020':'#888';
    h+=`<div class="dpatch"><div class="dpatch-dot" style="background:${col}"></div>
      <div><div class="dpatch-title">${title}</div><div class="dpatch-desc">${desc}</div></div></div>`;});
  el.innerHTML=h;
}

function closeDetail(){document.getElementById('detail').classList.remove('open');}

function openSearch(){
  document.getElementById('search-ov').classList.add('open');
  document.getElementById('srch-in').value='';
  document.getElementById('srch-results').innerHTML='';
  setTimeout(()=>document.getElementById('srch-in').focus(),80);
}
function closeSearch(){document.getElementById('search-ov').classList.remove('open');}
function doSearch(q){
  const sq=q.toLowerCase().trim();
  if(!sq){document.getElementById('srch-results').innerHTML='';return;}
  const res=BUILDS.filter(b=>b.name.toLowerCase().includes(sq)||b.sub.toLowerCase().includes(sq));
  if(!res.length){document.getElementById('srch-results').innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>No builds found</div>`;return;}
  document.getElementById('srch-results').innerHTML=res.map(buildCard).join('');
  document.querySelectorAll('#srch-results .bcard').forEach((el,i)=>{
    el.onclick=()=>{closeSearch();setTimeout(()=>openDetail(res[i].id),50);};
  });
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeSearch();}});
renderAll();
</script>
</body>
</html>
